<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="OpenInfra Logger">
  <defs>
    <pattern id="dots2" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F4F2EC" opacity="0.07"></circle>
    </pattern>
    <mask id="fadeMask2">
      <linearGradient id="fadeGrad2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="white" stop-opacity="1"></stop>
        <stop offset="0.9" stop-color="white" stop-opacity="0"></stop>
      </linearGradient>
      <rect width="1200" height="630" fill="url(#fadeGrad2)"></rect>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="#0A0C10"></rect>
  <rect width="1200" height="630" fill="url(#dots2)" mask="url(#fadeMask2)"></rect>

  <g transform="translate(770 -90) scale(6)" opacity="0.06"><g fill="#F4F2EC">
      <rect x="14" y="18" width="22" height="4"></rect>
      <rect x="42" y="18" width="14" height="4"></rect>
      <rect x="62" y="18" width="24" height="4"></rect>
      <rect x="14" y="32" width="16" height="4"></rect>
      <rect x="36" y="32" width="28" height="4"></rect>
      <rect x="70" y="32" width="16" height="4"></rect>
    </g>
    
    <rect x="14" y="64" width="72" height="6" fill="#F4F2EC"></rect>
    <rect x="14" y="78" width="72" height="6" fill="#F4F2EC"></rect></g>

  <g transform="translate(90 90)">
    <g transform="scale(0.55)"><g fill="#F4F2EC">
      <rect x="14" y="18" width="22" height="4"></rect>
      <rect x="42" y="18" width="14" height="4"></rect>
      <rect x="62" y="18" width="24" height="4"></rect>
      <rect x="14" y="32" width="16" height="4"></rect>
      <rect x="36" y="32" width="28" height="4"></rect>
      <rect x="70" y="32" width="16" height="4"></rect>
    </g>
    <circle cx="50" cy="50" r="3.5" fill="#FF5C28"></circle>
    <rect x="14" y="64" width="72" height="6" fill="#F4F2EC"></rect>
    <rect x="14" y="78" width="72" height="6" fill="#F4F2EC"></rect></g>
    <text x="74" y="38" fill="#F4F2EC" opacity="0.55" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="3px" text-transform="uppercase">OPENINFRA · LOGGER</text>
  </g>

  <g font-family="Geist, -apple-system, &#39;Segoe UI&#39;, system-ui, sans-serif" font-weight="600" letter-spacing="-0.035em">
    <text x="90" y="330" fill="#F4F2EC" font-size="84">One log shape.</text>
    <text x="90" y="420" font-size="84">
      <tspan fill="#FF5C28">Four runtimes.</tspan><tspan fill="#F4F2EC"> Zero deps.</tspan>
    </text>
  </g>

  <text x="90" y="475" fill="#F4F2EC" opacity="0.6" font-family="Geist, -apple-system, &#39;Segoe UI&#39;, system-ui, sans-serif" font-size="20">Universal structured logging · Auto-redaction · Native batching · AI root-cause.</text>

  <line x1="90" y1="540" x2="1110" y2="540" stroke="#F4F2EC" stroke-opacity="0.12"></line>
  <text x="90" y="580" fill="#F4F2EC" opacity="0.6" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="2px" text-transform="uppercase">NODE · PYTHON · GO · RUST</text>
  <text x="1110" y="580" text-anchor="end" fill="#FF5C28" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14">github.com/jonathascordeiro20/openinfra-logger</text>
</svg>