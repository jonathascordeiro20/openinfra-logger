<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="OpenInfra Logger — One log shape. Four runtimes. Zero dependencies.">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F4F2EC" opacity="0.07"></circle>
    </pattern>
    <mask id="fadeMask">
      <linearGradient id="fadeGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="white" stop-opacity="1"></stop>
        <stop offset="0.9" stop-color="white" stop-opacity="0"></stop>
      </linearGradient>
      <rect width="1280" height="640" fill="url(#fadeGrad)"></rect>
    </mask>
  </defs>

  
  <rect width="1280" height="640" fill="#0A0C10"></rect>
  <rect width="1280" height="640" fill="url(#dots)" mask="url(#fadeMask)"></rect>

  
  <g transform="translate(820 -100) scale(6)" opacity="0.06">
    <g fill="#F4F2EC">
      <rect x="14" y="18" width="22" height="4"></rect>
      <rect x="42" y="18" width="14" height="4"></rect>
      <rect x="62" y="18" width="24" height="4"></rect>
      <rect x="14" y="32" width="16" height="4"></rect>
      <rect x="36" y="32" width="28" height="4"></rect>
      <rect x="70" y="32" width="16" height="4"></rect>
    </g>
    
    <rect x="14" y="64" width="72" height="6" fill="#F4F2EC"></rect>
    <rect x="14" y="78" width="72" height="6" fill="#F4F2EC"></rect>
  </g>

  
  <g transform="translate(96 96)">
    <g transform="scale(0.6)"><g fill="#F4F2EC">
      <rect x="14" y="18" width="22" height="4"></rect>
      <rect x="42" y="18" width="14" height="4"></rect>
      <rect x="62" y="18" width="24" height="4"></rect>
      <rect x="14" y="32" width="16" height="4"></rect>
      <rect x="36" y="32" width="28" height="4"></rect>
      <rect x="70" y="32" width="16" height="4"></rect>
    </g>
    <circle cx="50" cy="50" r="3.5" fill="#FF5C28"></circle>
    <rect x="14" y="64" width="72" height="6" fill="#F4F2EC"></rect>
    <rect x="14" y="78" width="72" height="6" fill="#F4F2EC"></rect></g>
    <text x="80" y="42" fill="#F4F2EC" opacity="0.55" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" letter-spacing="3.2px" text-transform="uppercase">GITHUB.COM / OPENINFRA / LOGGER</text>
  </g>

  
  <g font-family="Geist, -apple-system, &#39;Segoe UI&#39;, system-ui, sans-serif" font-weight="600" letter-spacing="-0.035em">
    <text x="96" y="350" fill="#F4F2EC" font-size="92">One log shape.</text>
    <text x="96" y="440" font-size="92">
      <tspan fill="#FF5C28">Four runtimes.</tspan><tspan fill="#F4F2EC"> Zero deps.</tspan>
    </text>
  </g>

  
  <text x="96" y="498" fill="#F4F2EC" opacity="0.6" font-family="Geist, -apple-system, &#39;Segoe UI&#39;, system-ui, sans-serif" font-size="22">Structured telemetry for Node, Python, Go and Rust — built from each runtime&#39;s stdlib.</text>

  
  <g transform="translate(96 558)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="2.5px">
    <g transform="translate(0 0)">
        <rect x="0" y="-18" width="70" height="28" rx="14" fill="none" stroke="#F4F2EC" stroke-opacity="0.25"></rect>
        <text x="35" y="1" fill="#F4F2EC" fill-opacity="0.55" text-anchor="middle">NODE</text>
      </g><g transform="translate(82 0)">
        <rect x="0" y="-18" width="92" height="28" rx="14" fill="none" stroke="#F4F2EC" stroke-opacity="0.25"></rect>
        <text x="46" y="1" fill="#F4F2EC" fill-opacity="0.55" text-anchor="middle">PYTHON</text>
      </g><g transform="translate(186 0)">
        <rect x="0" y="-18" width="50" height="28" rx="14" fill="none" stroke="#F4F2EC" stroke-opacity="0.25"></rect>
        <text x="25" y="1" fill="#F4F2EC" fill-opacity="0.55" text-anchor="middle">GO</text>
      </g><g transform="translate(248 0)">
        <rect x="0" y="-18" width="68" height="28" rx="14" fill="none" stroke="#F4F2EC" stroke-opacity="0.25"></rect>
        <text x="34" y="1" fill="#F4F2EC" fill-opacity="0.55" text-anchor="middle">RUST</text>
      </g>
  </g>

  <text x="1184" y="560" text-anchor="end" fill="#FF5C28" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16">$ npm i @jonathascordeiro20/openinfra-logger</text>
</svg>