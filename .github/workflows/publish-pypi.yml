name: Publish to PyPI

# Triggered when a GitHub Release is published (e.g. v0.1.0, v0.2.0, ...).
# Uses PyPI Trusted Publishers (OIDC) — no API token in repository secrets.
#
# Required PyPI setup (one-time):
#   https://pypi.org/manage/account/publishing/
#   Project name:       openinfra-logger
#   Owner:              jonathascordeiro20
#   Repository name:    openinfra-logger
#   Workflow filename:  publish-pypi.yml
#   Environment name:   pypi  (must match the `environment:` block below)

on:
  release:
    types: [published]
  workflow_dispatch: # also allow manual runs from the Actions tab

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        working-directory: python
        run: python -m build

      - name: Validate metadata with twine
        working-directory: python
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openinfra-logger/
    permissions:
      id-token: write # required for Trusted Publishers (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
