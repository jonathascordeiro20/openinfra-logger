name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Node dependencies
      run: npm install

    - name: Run Node.js Tests (Placeholder)
      run: |
        npm run test
        npm run lint

    - name: Verify Security Logging Example
      run: node examples/security-logging.js

    - name: Verify Python Logger Foundation
      run: python examples/python-basic-usage.py
