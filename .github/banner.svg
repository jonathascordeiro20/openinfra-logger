    <rect x="14" y="64" width="72" height="6" fill="#F4F2EC"></rect>
    <rect x="14" y="78" width="72" height="6" fill="#F4F2EC"></rect></g>

  <g transform="translate(640 130)">
    <text fill="#F4F2EC" opacity="0.5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="3px" text-transform="uppercase">OPEN-SOURCE · MIT · NODE · PYTHON · GO · RUST</text>
    <text y="60" fill="#F4F2EC" font-family="Geist, -apple-system, &#39;Segoe UI&#39;, system-ui, sans-serif" font-size="64" font-weight="600" letter-spacing="-0.03em">OpenInfra Logger</text>
    <text y="110" fill="#F4F2EC" opacity="0.6" font-family="Geist, -apple-system, &#39;Segoe UI&#39;, system-ui, sans-serif" font-size="20">Universal structured logging. Built from <tspan fill="#FF5C28" font-style="italic">nothing but stdlib</tspan>.</text>
    <text y="150" fill="#FF5C28" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14">$ npm i @jonathascordeiro20/openinfra-logger</text>
  </g>

  <g transform="translate(1380 100) scale(2)"><g fill="#F4F2EC">
